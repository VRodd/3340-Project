<!DOCTYPE html>
<html lang="en" data-theme=""> <!-- Root HTML element with theme support -->
<head>
  <meta charset="UTF-8" /> <!-- Character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Responsive scaling -->
  <meta name="description" content="Shop premium fitness gear at APEX Sport. Dumbbells, kettlebells, recovery tools and more." /> <!-- SEO description -->
  <meta name="keywords" content="fitness gear, dumbbells, kettlebells, resistance bands, recovery, APEX Sport shop" /> <!-- SEO keywords -->
  <title>Shop — APEX Sport</title> <!-- Page title -->

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- External stylesheet -->
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>

  <!-- Navigation bar -->
  <nav>
    <div class="nav-inner">

      <!-- Logo linking to homepage -->
      <a href="../index.php" class="logo">APE<span>X</span></a>

      <!-- Navigation links -->
      <ul class="nav-links">
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="../wiki/index.html">Help</a></li>
      </ul>

      <!-- Navigation action buttons -->
      <div class="nav-actions">

        <!-- Search button triggers toggleSearch() -->
        <button class="nav-icon-btn" onclick="toggleSearch()" aria-label="Search">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>

        <!-- Cart button triggers toggleCart() and shows cart count -->
        <button class="nav-icon-btn" onclick="toggleCart()" aria-label="Cart">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="cart-count" id="cart-count">0</span> <!-- Dynamic cart item count -->
        </button>

        <!-- Hamburger menu toggles mobile navigation -->
        <button class="hamburger" onclick="toggleMenu()" aria-label="Open menu">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <!-- Login button -->
        <a href="login.html" class="nav-icon-btn" aria-label="Login">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>

      </div>
    </div>
  </nav>

  <!-- Mobile menu (shown/hidden via toggleMenu()) -->
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-close" onclick="toggleMenu()" aria-label="Close menu">&#x2715;</button>

    <!-- Mobile navigation links -->
    <a href="products.html" onclick="toggleMenu()">Shop</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="../wiki/index.html" onclick="toggleMenu()">Help</a>
  </div>

  <!-- Main shop page content -->
  <div class="page-wrapper">

    <!-- Page title and subtitle -->
    <h1 class="page-title">SHOP</h1>
    <p class="page-subtitle">All products. Premium options only.</p>

    <!-- Filter bar for product categories -->
    <div class="filter-bar">

      <!-- Each button calls filterProducts() with a category -->
      <button class="filter-btn active" data-category="All" onclick="filterProducts('All')">All</button>
      <button class="filter-btn" data-category="Strength" onclick="filterProducts('Strength')">Strength</button>
      <button class="filter-btn" data-category="Cardio" onclick="filterProducts('Cardio')">Cardio</button>
      <button class="filter-btn" data-category="Recovery" onclick="filterProducts('Recovery')">Recovery</button>
      <button class="filter-btn" data-category="Accessories" onclick="filterProducts('Accessories')">Accessories</button>

    </div>

    <!-- Container where products will be dynamically rendered -->
    <div class="product-grid" id="product-grid"></div>

  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <div class="footer-top" style="display:flex; justify-content:center;">
        <div style="text-align:center; max-width:420px;">
          <div class="footer-logo">APE<span>X</span></div> <!-- Logo -->
          <p class="footer-tagline">Premium fitness gear for athletes who demand more.</p> <!-- Tagline -->
        </div>
      </div>
    </div>
  </footer>

  <!-- External JavaScript (handles products, filtering, cart, etc.) -->
  <script src="../js/main.js"></script>

  <script>
    // When the page loads, render all products into the grid
    document.addEventListener("DOMContentLoaded", function() {
      renderProducts("product-grid", products); // Displays all products initially
    });
  </script>

</body>
</html>
