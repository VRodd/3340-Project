<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your APEX Sport account." />
  <meta name="keywords" content="APEX Sport login, account" />
  <title>Login — APEX Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="logo">APE<span>X</span></a>
      <ul class="nav-links">
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="../wiki/index.html">Help</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-icon-btn" onclick="toggleSearch()" aria-label="Search"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
        <button class="nav-icon-btn" onclick="toggleCart()" aria-label="Cart"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cart-count">0</span></button>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Open menu"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="login.html" class="nav-icon-btn" aria-label="Login"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
      </div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-close" onclick="toggleMenu()" aria-label="Close menu">&#x2715;</button>
    <a href="products.html" onclick="toggleMenu()">Shop</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="../wiki/index.html" onclick="toggleMenu()">Help</a>
  </div>

  <div class="form-page">
    <div class="form-card">
      <h1>LOG IN</h1>
      <p>Access your APEX Sport account.</p>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required />
      </div>
      <button class="btn-full" onclick="handleLogin()">Sign In</button>
      <p style="margin-top:16px; text-align:center; font-size:13px;">Don't have an account? <a href="register.html" style="color:var(--accent); font-weight:600;">Register</a></p>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-top" style="display:flex; justify-content:center;">
        <div style="text-align:center; max-width:420px;">
          <div class="footer-logo">APE<span>X</span></div>
          <p class="footer-tagline">Premium fitness gear for athletes who demand more.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function handleLogin() {
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      if (!email || !password) { showToast("Please fill in all fields"); return; }
      localStorage.setItem("apexUser", JSON.stringify({ email: email, loggedIn: true }));
      showToast("Logged in successfully");
      setTimeout(function() { window.location.href = "../index.html"; }, 1200);
    }
  </script>
</body>
</html>
