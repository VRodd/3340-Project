<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your APEX Sport shopping cart." />
  <meta name="keywords" content="APEX Sport cart, checkout" />
  <title>Cart — APEX Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="logo">APE<span>X</span></a>
      <ul class="nav-links">
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="../wiki/index.html">Help</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-icon-btn" onclick="toggleSearch()" aria-label="Search"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
        <button class="nav-icon-btn" onclick="window.location.reload()" aria-label="Cart"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cart-count">0</span></button>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Open menu"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="login.html" class="nav-icon-btn" aria-label="Login"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
      </div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-close" onclick="toggleMenu()" aria-label="Close menu">&#x2715;</button>
    <a href="products.html" onclick="toggleMenu()">Shop</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="../wiki/index.html" onclick="toggleMenu()">Help</a>
  </div>

  <div class="cart-page">
    <h1 class="page-title">YOUR CART</h1>
    <p class="page-subtitle">Review your items before checkout.</p>
    <div id="cart-items"></div>
    <div id="cart-summary-section"></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-top" style="display:flex; justify-content:center;">
        <div style="text-align:center; max-width:420px;">
          <div class="footer-logo">APE<span>X</span></div>
          <p class="footer-tagline">Premium fitness gear for athletes who demand more.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function renderCart() {
      var container = document.getElementById("cart-items");
      var summarySection = document.getElementById("cart-summary-section");
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty"><h2>CART IS EMPTY</h2><p>Add some gear to get started.</p><a href="products.html" class="btn-primary" style="display:inline-block; text-decoration:none;">Shop Now</a></div>';
        summarySection.innerHTML = "";
        return;
      }
      container.innerHTML = cart.map(function(item) {
        return '<div class="cart-item">' +
          '<div class="cart-item-img"><span>' + item.name.charAt(0) + '</span></div>' +
          '<div class="cart-item-details"><h3>' + item.name + '</h3><p>$' + item.price + ' each</p></div>' +
          '<div class="cart-item-qty">' +
            '<button onclick="changeQty(' + item.id + ',-1)">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button onclick="changeQty(' + item.id + ',1)">+</button>' +
          '</div>' +
          '<div class="cart-item-price">$' + (item.price * item.qty) + '</div>' +
          '<button class="cart-item-remove" onclick="removeAndRender(' + item.id + ')">&times;</button>' +
        '</div>';
      }).join("");
      var subtotal = getCartTotal();
      var tax = Math.round(subtotal * 0.13 * 100) / 100;
      summarySection.innerHTML =
        '<div class="cart-summary">' +
          '<div class="cart-summary-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>' +
          '<div class="cart-summary-row"><span>Tax (13%)</span><span>$' + tax.toFixed(2) + '</span></div>' +
          '<div class="cart-summary-row total"><span>Total</span><span>$' + (subtotal + tax).toFixed(2) + '</span></div>' +
          '<button class="btn-full" style="margin-top:16px;" onclick="showToast(\'Checkout not yet available\')">Checkout</button>' +
        '</div>';
    }
    function changeQty(id, delta) {
      var item = cart.find(function(i) { return i.id === id; });
      if (item) {
        item.qty = Math.max(1, item.qty + delta);
        saveCart();
        renderCart();
      }
    }
    function removeAndRender(id) {
      removeFromCart(id);
      renderCart();
    }
    document.addEventListener("DOMContentLoaded", renderCart);
  </script>
</body>
</html>
