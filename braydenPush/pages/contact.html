    <a href="products.html" onclick="toggleMenu()">Shop</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="../wiki/index.html" onclick="toggleMenu()">Help</a>
  </div>

  <div class="form-page" style="max-width:560px;">
    <div class="form-card">
      <h1>CONTACT US</h1>
      <p>Have a question? We're here to help.</p>
      <div class="form-group">
        <label for="contact-name">Your Name</label>
        <input type="text" id="contact-name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="contact-subject">Subject</label>
        <select id="contact-subject">
          <option value="">Select a topic</option>
          <option value="order">Order Issue</option>
          <option value="product">Product Question</option>
          <option value="returns">Returns &amp; Exchanges</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" placeholder="Describe your issue or question..." rows="5"></textarea>
      </div>
      <button class="btn-full" onclick="handleContact()">Send Message</button>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-top" style="display:flex; justify-content:center;">
        <div style="text-align:center; max-width:420px;">
          <div class="footer-logo">APE<span>X</span></div>
          <p class="footer-tagline">Premium fitness gear for athletes who demand more.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function handleContact() {
      var name = document.getElementById("contact-name").value;
      var email = document.getElementById("contact-email").value;
      var subject = document.getElementById("contact-subject").value;
      var message = document.getElementById("contact-message").value;
      if (!name || !email || !subject || !message) { showToast("Please fill in all fields"); return; }
      showToast("Message sent! We'll get back to you soon.");
      document.getElementById("contact-name").value = "";
      document.getElementById("contact-email").value = "";
      document.getElementById("contact-subject").value = "";
      document.getElementById("contact-message").value = "";
    }
  </script>
</body>
